<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The QC Report | Verified Gear</title>
    <style>
        body {
            background-color: transparent; 
            color: #ffffff;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #app-container, .glass-header, .nav-menu {
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .glass-header {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .header-avatar {
            width: 120px; 
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6)); 
        }

        .header-brand { font-size: 0.9rem; color: #ffcc00; font-weight: 800; text-transform: uppercase; }
        .header-title { font-size: 2.5rem; font-weight: 900; margin: 0 0 8px 0; }
        .header-desc { font-size: 0.95rem; color: #bbbbbb; }

        .nav-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        
        .nav-btn {
            background: rgba(20, 20, 20, 0.5); 
            backdrop-filter: blur(10px);
            color: #cccccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            font-weight: 700;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }
        
        .nav-btn:hover { background: rgba(40, 40, 40, 0.7); color: #ffffff; }
        .nav-btn.active { background: #ffffff; color: #000000; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }

        .card {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
        }
        .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
        .image-container { position: relative; height: 200px; }
        .product-image { width: 100%; height: 100%; object-fit: cover; }
        
        .badge {
            position: absolute; top: 12px; left: 12px; font-size: 0.7rem; font-weight: 800;
            padding: 4px 10px; border-radius: 50px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
        }

        .card-content { padding: 20px; }
        .product-title { font-size: 1.1rem; margin: 0 0 10px 0; }
        .btn {
            display: block; text-align: center; padding: 12px; margin-top: 15px;
            border-radius: 8px; text-decoration: none; font-weight: 700; background: #fff; color: #000;
        }
        .vs-badge { text-align: center; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="glass-header">
    <img src="avatar.png" alt="OneZapAway Avatar" class="header-avatar">
    <div class="header-text-container">
        <div class="header-brand">OneZapAway's</div>
        <h1 class="header-title">QC Report</h1>
        <p class="header-desc">Independent spec verification and hardware teardowns. We calculate the real factory data.</p>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" id="default-tab" onclick="switchTab('pass-list', this)">🟢 Verified Shop</button>
    <button class="nav-btn" onclick="switchTab('fail-list', this)">❌ Scam List</button>
    <button class="nav-btn" onclick="switchTab('teardowns', this)">⚖️ Compare</button>
    <button class="nav-btn" onclick="switchTab('guides', this)">📚 Guides</button>
    <button class="nav-btn" onclick="switchTab('stealth', this)">🎧 Stealth Audio</button>
</div>

<div id="app-container"></div>

<script>
const db = {
    comparisons: [
        {
            topic: "Flagship TWS",
            fail: { name: "Apple AirPods Pro 2", verdict: "Overpriced ecosystem lock.", button: "View", url: "#" },
            pass: { name: "Redmi Buds 8 Pro", verdict: "Exceptional value with 40dB ANC.", button: "Shop", url: "#" }
        }
    ],
    passList: [
        { name: "Redmi Buds 8 Pro", verdict: "Exceptional value with 40dB ANC.", button: "🛒 Shop Verified", url: "#" }
    ],
    failList: [],
    guides: [],
    stealthAudio: []
};

function switchTab(tabId, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('app-container');
    
    if (tabId === 'teardowns') {
        container.innerHTML = db.comparisons.map(c => `
            <div class="card" style="padding:20px;">
                <div style="text-align:center; font-weight:bold; margin-bottom:10px;">${c.topic}</div>
                <div class="grid-container">
                    <div style="background:rgba(255,0,0,0.1); padding:10px; border-radius:8px;">❌ ${c.fail.name}: ${c.fail.verdict}</div>
                    <div style="background:rgba(0,255,0,0.1); padding:10px; border-radius:8px;">🟢 ${c.pass.name}: ${c.pass.verdict}</div>
                </div>
            </div>`).join('');
    } else {
        const items = db[tabId] || [];
        container.innerHTML = `<div class="grid-container">${items.map(i => `
            <div class="card">
                <div class="image-container"><div class="badge">${tabId === 'pass-list' ? '🟢 PASS' : '❌ FAIL'}</div></div>
                <div class="card-content"><h3>${i.name}</h3><p>${i.verdict}</p><a href="${i.url}" class="btn">${i.button}</a></div>
            </div>`).join('')}</div>`;
    }
}

document.addEventListener("DOMContentLoaded", () => switchTab('pass-list', document.getElementById('default-tab')));
</script>
</body>
</html>
