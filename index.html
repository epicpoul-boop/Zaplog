<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The QC Report | Verified Gear</title>
    <style>
        body { background-color: transparent; color: #ffffff; font-family: "Inter", sans-serif; margin: 0; padding: 20px; }
        #app-container, .glass-header, .nav-menu { max-width: 900px; margin-left: auto; margin-right: auto; }
        
        .glass-header { background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 30px 40px; display: flex; align-items: center; gap: 30px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); box-sizing: border-box; }
        .header-avatar { width: 120px; height: auto; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6)); }
        .header-brand { font-size: 0.9rem; color: #ffcc00; font-weight: 800; text-transform: uppercase; }
        .header-title { font-size: 2.5rem; font-weight: 900; margin: 0 0 8px 0; }
        .header-desc { font-size: 0.95rem; color: #bbbbbb; margin: 0; }

        .nav-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .nav-btn { background: rgba(20, 20, 20, 0.5); backdrop-filter: blur(10px); color: #cccccc; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.9rem; font-weight: 700; padding: 10px 18px; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        .nav-btn:hover { background: rgba(40, 40, 40, 0.7); color: #ffffff; }
        .nav-btn.active { background: #ffffff; color: #000000; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }
        .card { background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(12px); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .image-container { position: relative; height: 220px; background: rgba(0, 0, 0, 0.3); }
        .product-image { width: 100%; height: 100%; object-fit: contain; padding: 10px; box-sizing: border-box; }
        .badge { position: absolute; top: 12px; left: 12px; font-size: 0.75rem; font-weight: 800; padding: 6px 12px; border-radius: 50px; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); }
        
        .card-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 8px 0; line-height: 1.3; }
        .price-tag { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 12px; }
        .verdict-text { font-size: 0.9rem; line-height: 1.5; color: #bbbbbb; margin: 0 0 20px 0; }
        
        .btn { display: block; text-align: center; padding: 14px; margin-top: auto; border-radius: 8px; text-decoration: none; font-weight: 700; background: #fff; color: #000; transition: all 0.2s ease; }
        .btn:hover { background: #e6e6e6; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="glass-header">
    <img src="https://i.imgur.com/TZmTjXO.jpg" alt="OneZapAway Avatar" class="header-avatar">
    <div class="header-text-container">
        <div class="header-brand">OneZapAway's</div>
        <h1 class="header-title">QC Report</h1>
        <p class="header-desc">Independent spec verification and hardware teardowns. We calculate the real factory data so you don't waste money on marketing lies.</p>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" id="default-tab" onclick="switchTab('pass-list', this)">🟢 Verified Shop</button>
    <button class="nav-btn" onclick="switchTab('teardowns', this)">⚖️ Compare</button>
</div>

<div id="app-container"></div>

<script>
const db = {
    comparisons: [
        {
            topic: "Flagship TWS Comparison",
            fail: { 
                name: "Apple AirPods 3 Pro", 
                price: "$249.00",
                image: "https://i.imgur.com/wwpMQ4X.jpg", 
                verdict: "The AirPods 3 Pro feature custom high-excursion Apple drivers, the H2 chip, and up to 8 hours of battery life with ANC enabled. While the ecosystem integration and peripheral sensors are top-tier, the $249 price point represents a steep premium where diminishing returns heavily apply for the pure audio experience.", 
                button: "View Official Specs", 
                url: "#" 
            },
            pass: { 
                name: "Redmi Buds 8 Pro", 
                price: "$69.99",
                image: "https://i.imgur.com/0HxsQ6p.jpg", 
                verdict: "Delivers exceptional hardware value, featuring 11mm dynamic drivers with a titanium diaphragm, full LDAC codec support for Hi-Res audio, and a verified 40dB of active noise cancellation. It provides comparable acoustic performance to flagship models for a fraction of the cost. The clear winner for pure value.", 
                button: "🛒 Shop Verified", 
                url: "#" 
            }
        }
    ],
    passList: [
        { 
            name: "Redmi Buds 8 Pro", 
            price: "$69.99",
            image: "https://i.imgur.com/0HxsQ6p.jpg", 
            verdict: "A thorough tech audit confirms the Redmi Buds 8 Pro offers exceptional price-to-performance. The hardware features 11mm dynamic drivers with a titanium diaphragm and full LDAC support for Hi-Res audio. Internal testing verifies the 40dB ANC depth, and real-world battery life reliably hits 6 hours per charge with ANC activated. It firmly beats flagship models in pure hardware value.", 
            button: "🛒 Shop Verified", 
            url: "#" 
        }
    ]
};

function switchTab(tabId, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('app-container');
    
    if (tabId === 'teardowns') {
        container.innerHTML = db.comparisons.map(c => `
            <div class="card" style="padding: 24px; background: rgba(10, 10, 10, 0.4);">
                <h3 style="text-align: center; font-weight: 800; font-size: 1.1rem; color: #fff; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em;">REPORT: ${c.topic}</h3>
                <div class="grid-container">
                    <div class="card">
                        <div class="image-container">
                            <div class="badge" style="background: rgba(255, 77, 77, 0.85); color: #fff; border-color: rgba(255, 77, 77, 0.4);">❌ OVERPRICED</div>
                            <img src="${c.fail.image}" class="product-image" alt="${c.fail.name}">
                        </div>
                        <div class="card-content">
                            <h3 class="product-title">${c.fail.name}</h3>
                            <div class="price-tag">${c.fail.price}</div>
                            <p class="verdict-text"><b>Tech Audit:</b> ${c.fail.verdict}</p>
                            <a href="${c.fail.url}" target="_blank" class="btn" style="background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid rgba(255, 255, 255, 0.1);">${c.fail.button}</a>
                        </div>
                    </div>
                    <div class="card">
                        <div class="image-container">
                            <div class="badge" style="background: rgba(46, 204, 113, 0.85); color: #000; border-color: rgba(46, 204, 113, 0.4);">🟢 PASS</div>
                            <img src="${c.pass.image}" class="product-image" alt="${c.pass.name}">
                        </div>
                        <div class="card-content">
                            <h3 class="product-title">${c.pass.name}</h3>
                            <div class="price-tag">${c.pass.price}</div>
                            <p class="verdict-text"><b>Tech Audit:</b> ${c.pass.verdict}</p>
                            <a href="${c.pass.url}" target="_blank" class="btn">${c.pass.button}</a>
                        </div>
                    </div>
                </div>
            </div>`).join('');
    } else {
        container.innerHTML = `<div class="grid-container">${db[tabId].map(i => `
            <div class="card">
                <div class="image-container">
                    <div class="badge" style="background: rgba(46, 204, 113, 0.85); color: #000; border-color: rgba(46, 204, 113, 0.4);">🟢 PASS</div>
                    <img src="${i.image}" class="product-image" alt="${i.name}">
                </div>
                <div class="card-content">
                    <h3 class="product-title">${i.name}</h3>
                    <div class="price-tag">${i.price}</div>
                    <p class="verdict-text">${i.verdict}</p>
                    <a href="${i.url}" target="_blank" class="btn">${i.button}</a>
                </div>
            </div>`).join('')}</div>`;
    }
}

document.addEventListener("DOMContentLoaded", () => switchTab('pass-list', document.getElementById('default-tab')));
</script>
</body>
</html>
