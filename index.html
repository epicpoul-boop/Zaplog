<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The QC Report | Verified Gear</title>
    <style>
        /* Premium Dark E-Commerce Styling */
        body {
            background-color: transparent;
            color: #ffffff;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 5px;
        }

        /* Navigation Menu - Mobile Bulletproof Version */
        .nav-menu {
            display: flex;
            flex-wrap: nowrap;
            gap: 12px;
            margin-top: 10px; 
            margin-bottom: 30px;
            padding: 10px 5px; 
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%; 
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none;
        }
        
        .nav-menu::-webkit-scrollbar { 
            display: none; 
        }

        .nav-btn {
            flex-shrink: 0; 
            background: #2a2a2a; 
            color: #ffffff;
            border: 1px solid #555555;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: block;
        }
        
        .nav-btn:hover { background: #3a3a3a; border-color: #777; }
        .nav-btn.active { background: #ffffff; color: #000000; border-color: #ffffff; }

        /* Layout Grids */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .single-column {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; gap: 24px; }
        }

        /* The VS Comparison Layout */
        .comparison-wrapper {
            background: #080808;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            position: relative;
        }

        .comparison-header {
            text-align: center; font-weight: 800; font-size: 1.1rem; color: #fff;
            margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em;
        }

        .vs-badge {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            background: #000; color: #fff; border: 2px solid #333; border-radius: 50%;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.85rem; z-index: 10;
        }

        /* Modern Shoppable Cards */
        .card {
            background: #121212;
            border-radius: 16px;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            border: 1px solid #222;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        
        .card:hover { transform: translateY(-4px); }
        .card.fail:hover { border-color: rgba(255, 77, 77, 0.5); }
        .card.pass:hover { border-color: rgba(46, 204, 113, 0.5); }

        /* Image Container & Floating Badge */
        .image-container {
            position: relative;
            width: 100%;
            height: 220px;
            background: #0a0a0a;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0.9;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            padding: 6px 12px;
            border-radius: 50px;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .fail .badge { background: rgba(255, 77, 77, 0.9); color: #fff; }
        .pass .badge { background: rgba(46, 204, 113, 0.9); color: #000; }
        .neutral .badge { background: rgba(255, 255, 255, 0.9); color: #000; }

        /* Card Content Area */
        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 8px 0; line-height: 1.3; }
        
        .price-tag {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }

        .verdict-text { font-size: 0.9rem; line-height: 1.5; color: #999; margin: 0 0 20px 0; }
        
        /* Shoppable Buttons */
        .btn {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            padding: 14px; margin-top: auto; border-radius: 8px; text-decoration: none; 
            font-weight: 700; font-size: 0.95rem; transition: all 0.2s ease;
        }
        .fail .btn { background: #1a1a1a; color: #666; }
        .fail .btn:hover { background: #222; color: #fff; }
        .pass .btn { background: #fff; color: #000; } 
        .pass .btn:hover { background: #e6e6e6; transform: scale(1.02); }
        .neutral .btn { background: #fff; color: #000; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="nav-menu">
    <button class="nav-btn active" onclick="switchTab('teardowns')">Compare Gear</button>
    <button class="nav-btn" onclick="switchTab('pass-list')">Verified Shop</button>
    <button class="nav-btn" onclick="switchTab('fail-list')">Fail List</button>
    <button class="nav-btn" onclick="switchTab('guides')">Guides</button>
    <button class="nav-btn" onclick="switchTab('stealth')">Stealth Audio</button>
</div>

<div id="app-container"></div>

<script>
/**
 * THE DATABASE
 * Add your product text and image links here.
 */
const db = {
    comparisons: [
        {
            topic: "15W Desk Lamps",
            fail: {
                name: "Viral '15W' Wood Lamp",
                price: "$29.99",
                image: "https://images.unsplash.com/photo-1517705008128-361805f42e86?q=80&w=600&auto=format&fit=crop", 
                verdict: "Schematic check reveals max input of 5V/1A (5W). The 15W claim is a data fabrication.",
                button: "View Fake Listing",
                url: "#"
            },
            pass: {
                name: "Verified Qi-Certified Lamp",
                price: "$18.50",
                image: "https://images.unsplash.com/photo-1580130732566-0ce91e84a205?q=80&w=600&auto=format&fit=crop", 
                verdict: "Continuous 15W verified via chip analysis. Built with proper thermal dissipation.",
                button: "🛒 Shop Verified",
                url: "#"
            }
        }
    ],

    passList: [
        { 
            name: "Heavy-Duty Surge Strip", 
            price: "$34.99",
            image: "https://images.unsplash.com/photo-1558227091-a583e73543b5?q=80&w=600&auto=format&fit=crop",
            verdict: "Passed internal circuit testing. Legitimate joule rating verified.", 
            button: "🛒 Buy on Amazon", 
            url: "#" 
        }
    ],

    failList: [],
    
    guides: [],
    
    stealthAudio: [
        { 
            name: "Hidden Audio Hub", 
            price: "$149.00",
            image: "https://images.unsplash.com/photo-1545454675-3531b543be5d?q=80&w=600&auto=format&fit=crop",
            verdict: "Curated, specialized audio gear designed to blend perfectly into your environment.", 
            button: "View Details", 
            url: "#" 
        }
    ]
};

// Render Engine
const container = document.getElementById('app-container');

function renderCard(item, status) {
    const badgeMap = { 'pass': '🟢 PASS', 'fail': '❌ FAIL', 'neutral': '📄 INFO' };
    const priceHtml = item.price ? `<div class="price-tag">${item.price}</div>` : '';
    
    return `
        <div class="card ${status}">
            <div class="image-container">
                <div class="badge">${badgeMap[status]}</div>
                <img src="${item.image || 'https://via.placeholder.com/600x400/111/333?text=No+Image'}" class="product-image" alt="${item.name}">
            </div>
            <div class="card-content">
                <h3 class="product-title">${item.name}</h3>
                ${priceHtml}
                <p class="verdict-text">${item.verdict}</p>
                <a href="${item.url}" target="_blank" class="btn">${item.button}</a>
            </div>
        </div>
    `;
}

function renderComparisons() {
    return db.comparisons.map(comp => `
        <div class="comparison-wrapper">
            <div class="comparison-header">REPORT: ${comp.topic}</div>
            <div class="grid-container">
                ${renderCard(comp.fail, 'fail')}
                ${renderCard(comp.pass, 'pass')}
            </div>
            <div class="vs-badge">VS</div>
        </div>
    `).join('');
}

function renderGrid(array, status) {
    if (array.length === 0) return `<p style="text-align:center; color:#666; margin-top:40px;">No items in this category yet.</p>`;
    return `<div class="grid-container">` + array.map(item => renderCard(item, status)).join('') + `</div>`;
}

// Tab Switching
function switchTab(tabId) {
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');

    let html = '';
    if (tabId === 'teardowns') html = `<div class="single-column">${renderComparisons()}</div>`;
    if (tabId === 'pass-list') html = renderGrid(db.passList, 'pass');
    if (tabId === 'fail-list') html = renderGrid(db.failList, 'fail');
    if (tabId === 'guides') html = renderGrid(db.guides, 'neutral');
    if (tabId === 'stealth') html = renderGrid(db.stealthAudio, 'neutral');

    container.innerHTML = html;
}

document.addEventListener("DOMContentLoaded", () => switchTab('teardowns'));
</script>
</body>
</html>
