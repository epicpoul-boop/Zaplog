<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The QC Report | Verified Gear</title>
    <style>
        body {
            background-color: transparent; 
            color: #ffffff;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* --- CENTERED APP CONTAINER --- */
        #app-container, .glass-header, .nav-menu {
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- WIDE GLASS HEADER --- */
        .glass-header {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .header-avatar {
            width: 120px; 
            height: auto;
            flex-shrink: 0;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6)); 
        }

        .header-brand {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #ffcc00; 
            font-weight: 800;
            margin-bottom: 4px;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0 0 8px 0;
            color: #ffffff;
        }

        .header-desc {
            font-size: 0.95rem;
            color: #bbbbbb;
            margin: 0;
        }

        /* Navigation Menu */
        .nav-menu {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px;
            margin-bottom: 30px;
            padding: 10px 0; 
        }

        .nav-btn {
            background: rgba(20, 20, 20, 0.5); 
            backdrop-filter: blur(10px);
            color: #cccccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            font-weight: 700;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover { background: rgba(40, 40, 40, 0.7); color: #ffffff; }
        .nav-btn.active { background: #ffffff; color: #000000; }
        .btn-verified.active { background: #2ecc71; border-color: #2ecc71; }
        .btn-fail.active { background: #ff4d4d; border-color: #ff4d4d; }

        /* Smart Grid */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 24px; 
        }
        .single-column { display: grid; gap: 40px; }

        /* Cards */
        .card {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
        }
        .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
        .image-container { position: relative; height: 200px; }
        .product-image { width: 100%; height: 100%; object-fit: cover; }
        
        .badge {
            position: absolute; top: 12px; left: 12px; font-size: 0.7rem; font-weight: 800;
            padding: 4px 10px; border-radius: 50px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
        }

        .card-content { padding: 20px; }
        .product-title { font-size: 1.1rem; margin: 0 0 10px 0; }
        .btn {
            display: block; text-align: center; padding: 12px; margin-top: 15px;
            border-radius: 8px; text-decoration: none; font-weight: 700; background: #fff; color: #000;
        }
    </style>
</head>
<body>

<div class="glass-header">
    <img src="avatar.png" alt="OneZapAway Avatar" class="header-avatar">
    <div class="header-text-container">
        <div class="header-brand">OneZapAway's</div>
        <h1 class="header-title">QC Report</h1>
        <p class="header-desc">Independent spec verification and hardware teardowns. We calculate the real factory data so you don't waste money on marketing lies.</p>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn btn-verified active" id="default-tab" onclick="switchTab('pass-list', this)">🟢 Verified Shop</button>
    <button class="nav-btn btn-fail" onclick="switchTab('fail-list', this)">❌ Scam List</button>
    <button class="nav-btn" onclick="switchTab('teardowns', this)">⚖️ Compare</button>
    <button class="nav-btn" onclick="switchTab('guides', this)">📚 Guides</button>
    <button class="nav-btn" onclick="switchTab('stealth', this)">🎧 Stealth Audio</button>
</div>

<div id="app-container"></div>

<script>
const db = {
    comparisons: [],
    passList: [
        { name: "Redmi Buds 8 Pro", price: "$69.99", image: "https://via.placeholder.com/600x300", verdict: "Exceptional value with 40dB ANC.", button: "🛒 Shop Verified", url: "#" }
    ],
    failList: [],
    guides: [],
    stealthAudio: []
};

function renderCard(item, status) {
    const badge = status === 'pass' ? '🟢 PASS' : '❌ FAIL';
    return `<div class="card"><div class="image-container"><div class="badge">${badge}</div><img src="${item.image}" class="product-image"></div><div class="card-content"><h3 class="product-title">${item.name}</h3><p>${item.verdict}</p><a href="${item.url}" class="btn">${item.button}</a></div></div>`;
}

function switchTab(tabId, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = document.getElementById('app-container');
    const data = db[tabId === 'teardowns' ? 'comparisons' : tabId] || [];
    container.innerHTML = `<div class="grid-container">${data.map(i => renderCard(i, tabId === 'pass-list' ? 'pass' : 'fail')).join('')}</div>`;
}

document.addEventListener("DOMContentLoaded", () => switchTab('pass-list', document.getElementById('default-tab')));
</script>
</body>
</html>
